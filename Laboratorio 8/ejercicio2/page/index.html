<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Actuadores - EIE 390</title>
    
    <!-- Sección de estilos (CSS) para que los botones se vean bien -->
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin-top: 50px; 
            background-color: #f4f4f9;
        }
        .contenedor {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
        }
        .btn { 
            padding: 15px 30px; 
            font-size: 18px; 
            margin: 10px; 
            cursor: pointer; 
            border-radius: 8px; 
            border: none; 
            color: white; 
            font-weight: bold; 
        }
        /* Colores específicos para cada botón */
        .btn-on { background-color: #28a745; } 
        .btn-off { background-color: #dc3545; } 
        
        /* Efecto al pasar el mouse */
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Laboratorio: Control desde la Web</h1>
        <h3>Actuador: Diodo LED</h3>
        
        <!-- 
            EXPLICACIÓN DE LA FUNCIÓN FETCH:
            Cuando el usuario hace clic (onclick), la función nativa de JavaScript 'fetch()'
            hace una petición HTTP a la dirección indicada. 
            En este caso, avisa a nuestro servidor FastAPI.
        -->
        
        <!-- Al hacer clic, enviamos una petición GET a http://127.0.0.1:8000/led/1 -->
        <button class="btn btn-on" onclick="fetch('/led/1')">Encender LED</button>
        
        <!-- Al hacer clic, enviamos una petición GET a http://127.0.0.1:8000/led/0 -->
        <button class="btn btn-off" onclick="fetch('/led/0')">Apagar LED</button>
    </div>

</body>
</html>
